openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Shopify MCP AI Shopping Agent API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: stores
    description: Store management
  - name: knowledge
    description: Shop knowledge entries
  - name: chat
    description: Chat operations
  - name: conversations
    description: Conversation history
  - name: preferences
    description: User preferences
  - name: analytics
    description: Analytics dashboard
  - name: sessions
    description: Session management
  - name: auth
    description: Shopify OAuth
  - name: experiments
    description: A/B prompt experiments

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/install:
    get:
      operationId: authInstall
      tags: [auth]
      summary: Start Shopify OAuth install
      parameters:
        - name: shop
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect to Shopify OAuth

  /auth/callback:
    get:
      operationId: authCallback
      tags: [auth]
      summary: Shopify OAuth callback
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: shop
          in: query
          required: true
          schema:
            type: string
        - name: hmac
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect to app after successful auth

  /sessions:
    post:
      operationId: createSession
      tags: [sessions]
      summary: Create a new session for a store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionBody"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /stores:
    get:
      operationId: listStores
      tags: [stores]
      summary: List all configured stores
      responses:
        "200":
          description: List of stores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Store"
    post:
      operationId: createStore
      tags: [stores]
      summary: Add a new store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStoreBody"
      responses:
        "201":
          description: Store created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  /stores/{storeDomain}:
    get:
      operationId: getStore
      tags: [stores]
      summary: Get store details
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Store details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
        "404":
          description: Store not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateStore
      tags: [stores]
      summary: Update store settings
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStoreBody"
      responses:
        "200":
          description: Store updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
        "404":
          description: Store not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteStore
      tags: [stores]
      summary: Remove a store
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Store deleted

  /stores/{storeDomain}/public:
    get:
      operationId: getStorePublic
      tags: [stores]
      summary: Get public store info (no auth required)
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public store info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorePublicInfo"
        "404":
          description: Store not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stores/{storeDomain}/knowledge:
    get:
      operationId: listKnowledge
      tags: [knowledge]
      summary: List shop knowledge entries
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Knowledge entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KnowledgeEntry"
    post:
      operationId: createKnowledge
      tags: [knowledge]
      summary: Add a knowledge entry
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKnowledgeBody"
      responses:
        "201":
          description: Knowledge entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeEntry"

  /stores/{storeDomain}/knowledge/{knowledgeId}:
    patch:
      operationId: updateKnowledge
      tags: [knowledge]
      summary: Update a knowledge entry
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
        - name: knowledgeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateKnowledgeBody"
      responses:
        "200":
          description: Knowledge entry updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeEntry"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteKnowledge
      tags: [knowledge]
      summary: Delete a knowledge entry
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
        - name: knowledgeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /stores/{storeDomain}/knowledge/deleted:
    get:
      operationId: listDeletedKnowledge
      tags: [knowledge]
      summary: List recently deleted knowledge entries
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of deleted knowledge entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KnowledgeEntry"

  /stores/{storeDomain}/knowledge/{knowledgeId}/restore:
    patch:
      operationId: restoreKnowledge
      tags: [knowledge]
      summary: Restore a soft-deleted knowledge entry
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
        - name: knowledgeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Knowledge entry restored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeEntry"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stores/{storeDomain}/knowledge/{knowledgeId}/versions:
    get:
      operationId: listKnowledgeVersions
      tags: [knowledge]
      summary: List version history for a knowledge entry
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
        - name: knowledgeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Version history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KnowledgeVersion"

  /stores/{storeDomain}/knowledge/{knowledgeId}/versions/{versionId}/restore:
    post:
      operationId: restoreKnowledgeVersion
      tags: [knowledge]
      summary: Restore a knowledge entry to a previous version
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
        - name: knowledgeId
          in: path
          required: true
          schema:
            type: integer
        - name: versionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Knowledge entry restored to version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeEntry"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stores/{storeDomain}/knowledge/search:
    get:
      operationId: searchKnowledge
      tags: [knowledge]
      summary: Search knowledge entries by title, content, or tags
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: tag
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KnowledgeEntry"

  /stores/{storeDomain}/knowledge/sync:
    post:
      operationId: triggerKnowledgeSync
      tags: [knowledge]
      summary: Trigger a manual Shopify content sync
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"

  /stores/{storeDomain}/knowledge/sync/status:
    get:
      operationId: getKnowledgeSyncStatus
      tags: [knowledge]
      summary: Get sync status for a store
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Sync status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStatus"

  /stores/{storeDomain}/knowledge/sync/settings:
    patch:
      operationId: updateSyncSettings
      tags: [knowledge]
      summary: Update sync frequency settings
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSyncSettingsBody"
      responses:
        "200":
          description: Updated sync settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStatus"

  /stores/{storeDomain}/chat:
    post:
      operationId: sendChat
      tags: [chat]
      summary: Send a chat message (returns SSE stream)
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: SSE stream of chat events
          content:
            text/event-stream:
              schema:
                type: string

  /stores/{storeDomain}/conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      summary: List conversations for a session
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
        - name: sessionId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

  /stores/{storeDomain}/conversations/{conversationId}:
    get:
      operationId: getConversation
      tags: [conversations]
      summary: Get a conversation with messages
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteConversation
      tags: [conversations]
      summary: Delete a conversation
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /stores/{storeDomain}/conversations/deleted:
    get:
      operationId: listDeletedConversations
      tags: [conversations]
      summary: List recently deleted conversations
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
        - name: sessionId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of deleted conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

  /stores/{storeDomain}/conversations/{conversationId}/restore:
    patch:
      operationId: restoreConversation
      tags: [conversations]
      summary: Restore a soft-deleted conversation
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation restored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stores/{storeDomain}/preferences:
    get:
      operationId: getPreferences
      tags: [preferences]
      summary: Get user preferences for a session
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
        - name: sessionId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"
    put:
      operationId: updatePreferences
      tags: [preferences]
      summary: Update user preferences
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePreferencesBody"
      responses:
        "200":
          description: Preferences updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"

  /stores/{storeDomain}/checkout-recovery:
    get:
      operationId: checkAbandonedCheckout
      tags: [chat]
      summary: Check if session has an abandoned checkout eligible for recovery
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
        - name: sessionId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Abandoned checkout recovery data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutRecoveryData"

  /stores/{storeDomain}/checkout-recovery/action:
    post:
      operationId: checkoutRecoveryAction
      tags: [chat]
      summary: Record a checkout recovery action (resume, dismiss, convert)
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutRecoveryActionBody"
      responses:
        "200":
          description: Action recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success

  /stores/{storeDomain}/analytics:
    get:
      operationId: getAnalytics
      tags: [analytics]
      summary: Get analytics data for a store
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
        - name: days
          in: query
          required: false
          schema:
            type: integer
            default: 7
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsData"

  /stores/{storeDomain}/analytics/enhanced:
    get:
      operationId: getEnhancedAnalytics
      tags: [analytics]
      summary: Get enhanced analytics with conversion funnel, tool usage, and revenue data
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
        - name: days
          in: query
          required: false
          schema:
            type: integer
            default: 7
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Enhanced analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnhancedAnalyticsData"

  /stores/{storeDomain}/analytics/daily-queries:
    get:
      operationId: getDailyQueries
      tags: [analytics]
      summary: Get top queries for a specific date
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Daily query data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyQueriesData"

  /stores/{storeDomain}/feedback:
    post:
      operationId: submitFeedback
      tags: [analytics]
      summary: Submit thumbs up/down feedback on an AI response
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
        - name: x-session-id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackBody"
      responses:
        "200":
          description: Feedback recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackResponse"

  /stores/{storeDomain}/experiments:
    get:
      operationId: listExperiments
      tags: [experiments]
      summary: List all experiments for a store
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of experiments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PromptExperiment"
    post:
      operationId: createExperiment
      tags: [experiments]
      summary: Create a new A/B prompt experiment
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExperimentBody"
      responses:
        "201":
          description: Experiment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptExperiment"
        "409":
          description: An active experiment already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stores/{storeDomain}/experiments/{experimentId}:
    get:
      operationId: getExperiment
      tags: [experiments]
      summary: Get an experiment by ID
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
        - name: experimentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Experiment details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptExperiment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stores/{storeDomain}/experiments/{experimentId}/complete:
    post:
      operationId: completeExperiment
      tags: [experiments]
      summary: Complete an experiment and declare a winner
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
        - name: experimentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteExperimentBody"
      responses:
        "200":
          description: Experiment completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptExperiment"

  /stores/{storeDomain}/experiments/{experimentId}/archive:
    post:
      operationId: archiveExperiment
      tags: [experiments]
      summary: Archive an experiment
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
        - name: experimentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Experiment archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptExperiment"

  /stores/{storeDomain}/experiments/{experimentId}/analytics:
    get:
      operationId: getExperimentAnalytics
      tags: [experiments]
      summary: Get side-by-side analytics for an experiment
      parameters:
        - name: storeDomain
          in: path
          required: true
          schema:
            type: string
        - name: experimentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Experiment analytics comparison
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExperimentAnalytics"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Store:
      type: object
      properties:
        storeDomain:
          type: string
        storefrontToken:
          type: ["string", "null"]
        provider:
          type: string
          enum: [openai, anthropic, xai, gemini]
        model:
          type: string
        hasApiKey:
          type: boolean
        ucpCompliant:
          type: boolean
        chatEnabled:
          type: boolean
        embedEnabled:
          type: boolean
        guardSensitivity:
          type: string
          enum: [off, low, medium, high]
        blockedTopics:
          type: array
          items:
            type: string
        brandVoice:
          type: ["object", "null"]
          properties:
            tone:
              type: string
              enum: [friendly, professional, playful, luxury]
            personality:
              type: string
            greeting:
              type: string
            signOff:
              type: string
        customInstructions:
          type: ["string", "null"]
        welcomeMessage:
          type: ["string", "null"]
        recommendationStrategy:
          type: string
          enum: [bestsellers_first, new_arrivals_first, price_low_to_high, personalized]
        checkoutRecoveryEnabled:
          type: boolean
        checkoutRecoveryDelayMinutes:
          type: integer
        supportedLanguages:
          type: array
          items:
            type: string
        defaultLanguage:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - storeDomain
        - provider
        - model
        - hasApiKey
        - ucpCompliant
        - chatEnabled
        - guardSensitivity
